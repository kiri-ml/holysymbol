name: Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      ref:
        required: false
        type: string
        description: Git ref to deploy
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

concurrency:
  group: deploy-${{ inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: |
          npm run check
          npm test

      - name: Build app
        run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist --project-name holysymbol
            --branch ${{ inputs.ref || github.ref_name }}
